# MoE Training Config (Gemma 4 26B MoE -- pre-quantized expert cache)
# -------------------------------------------------------------------

model:
  name: "google/gemma-4-26b-A4B-it"
  moe_cache_dir: "./data/moe_cache"  # built by convert_gemma4_moe.py

# QLoRA -- Gemma4TextAttention uses plain nn.Linear (not Gemma4ClippableLinear).
# exclude_modules regex blocks vision/audio tower Gemma4ClippableLinear modules
# that also have q_proj/k_proj children and would otherwise be matched.
qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  exclude_modules: '.*(vision_tower|audio_tower|embed_vision|embed_audio)\..*'
  task_type: "CAUSAL_LM"

dpo_qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  exclude_modules: '.*(vision_tower|audio_tower|embed_vision|embed_audio)\..*'
  task_type: "CAUSAL_LM"

qlora_with_mlp:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  exclude_modules: '.*(vision_tower|audio_tower|embed_vision|embed_audio)\..*'
  task_type: "CAUSAL_LM"

data:
  sft_chain_dir: "./data/sft_chains_scored.parquet"
  test_split: 0.05
  seed: 42
  min_chain_depth: 3
  min_total_score: 0.0
  weight_beta: 0
  weight_mode: "gate_amplify"
  weight_floor: 0.1
  weight_max: 2.0

profiles:
  local:
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 1
    bf16: false
    fp16: true
    full_finetune: false
    attn_implementation: "eager"
    gradient_checkpointing: true
    max_length: 1024

  cloud:
    # QLoRA gemma-4-26b-A4B-it, RTX PRO 6000 WS 96GB
    # Expert FFN in nf4 (cache), attention in 4-bit -- ~15GB weights, ample headroom
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 2
    bf16: true
    fp16: false
    full_finetune: false
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

  cloud_full:
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    bf16: true
    fp16: false
    full_finetune: true
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

dpo:
  data_dir: "./data/dpo_pairs.parquet"
  beta: 0.1
  loss_type: ["sigmoid", "sft"]
  loss_weights: [1.0, 0.1]
  output_dir: "outputs/dpo"
  learning_rate: 5.0e-6
  num_train_epochs: 1
  max_prompt_length: 1024
  save_steps: 1000
  eval_steps: 1000
  min_score_delta: 0.0
  precompute_ref_log_probs: false
  chosen_weighting: false
  weight_beta: 0.3
  weight_mode: "gate_amplify"
  run_name: "gemma4-26b-moe-dpo"

training:
  output_dir: "outputs/gemma4_sft"
  num_train_epochs: 2
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine_with_restarts"
  lr_scheduler_kwargs:
    num_cycles: 3
  logging_steps: 10
  save_steps: 2000
  eval_steps: 2000
  eval_strategy: "steps"
  save_total_limit: 5
  report_to: "wandb"
  run_name: "gemma4-26b-moe-sft"
  dataset_num_proc: 16
