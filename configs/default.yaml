# MoE Training Config (Gemma 4 26B)
# ----------------------------------

model:
  name: "google/gemma-4-26b-A4B-it"

# QLoRA config -- attention-only targets for MoE backbone.
# Expert FFN weights are packed nn.Parameters (not nn.Linear), so LoRA
# cannot target them directly. The shared per-layer MLP (gate_proj etc.)
# can be added if attention-only underperforms.
qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"

# QLoRA config for DPO (larger rank for preference learning)
dpo_qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"

# Optional: attention + shared MLP targets (use if attention-only plateaus)
qlora_with_mlp:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

data:
  sft_chain_dir: "./data/sft_chains_scored.parquet"
  test_split: 0.05
  seed: 42
  min_chain_depth: 3
  min_total_score: 0.0
  weight_beta: 0 # do a simple sft first
  weight_mode: "gate_amplify"
  weight_floor: 0.1
  weight_max: 2.0

# Hardware profiles
profiles:
  local:
    # TITAN RTX 24GB -- too small for 26B MoE, eval/prototyping only
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 1
    bf16: false
    fp16: true
    full_finetune: false
    attn_implementation: "eager"
    gradient_checkpointing: true
    max_length: 1024

  cloud:
    # QLoRA on MoE 26B, RTX PRO 6000 WS 96GB
    # 26B params in 4-bit ~ 14GB weights + LoRA adapters + activations
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    bf16: true
    fp16: false
    full_finetune: false
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 4096

  cloud_full:
    # Full FT 26B -- needs multi-GPU or very large VRAM
    # All 26B params + Adam states ~ 200GB+ in bf16
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    bf16: true
    fp16: false
    full_finetune: true
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

# DPO training
dpo:
  data_dir: "./data/dpo_pairs.parquet"
  beta: 0.1
  loss_type: ["sigmoid", "sft"]
  loss_weights: [1.0, 0.1]
  output_dir: "outputs/dpo"
  learning_rate: 5.0e-6
  num_train_epochs: 1
  max_prompt_length: 1024
  save_steps: 1000
  eval_steps: 1000
  min_score_delta: 0.0
  precompute_ref_log_probs: false
  chosen_weighting: false
  weight_beta: 0.3
  weight_mode: "gate_amplify"
  run_name: "gemma4-26b-dpo"

# Weighted SFT training
training:
  output_dir: "outputs/sft"
  num_train_epochs: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine_with_restarts"
  logging_steps: 10
  save_steps: 2000
  eval_steps: 2000
  eval_strategy: "steps"
  save_total_limit: 3
  report_to: "wandb"
  run_name: "gemma4-26b-sft"
  dataset_num_proc: 16
