# SFT/DPO Config -- Gemma 3 27B (dense proxy)
# -------------------------------------------
# The Gemma 4 26B MoE target lives in configs/moe.yaml. This dense Gemma 3
# config is the cheap proxy used to rehearse the recipe (attention-frozen,
# MLP-only LoRA) before committing the heavier MoE run. Note: Gemma 3's RoPE
# (linear PI) differs from Gemma 4's, so long-context results do NOT transfer
# from here -- validate long-context on the MoE itself.

model:
  name: "google/gemma-3-27b-it"

quantization:
  bits: 4

# Attention-only LoRA.
qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"

# QLoRA config for DPO (larger rank for preference learning)
dpo_qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"

# Attention + shared MLP targets.
qlora_with_mlp:
  r: 256
  lora_alpha: 256
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

# Long-context-preserving: MLP only, attention frozen. Rehearses the MoE
# recipe (q/k/v/o never updated -> attention + RoPE untouched). Run with
# --qlora-section qlora_mlp_only.
qlora_mlp_only:
  r: 128
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  exclude_modules: '.*(vision_tower|audio_tower|embed_vision|embed_audio)\..*'
  task_type: "CAUSAL_LM"

dpo_qlora_mlp_only:
  r: 128
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  exclude_modules: '.*(vision_tower|audio_tower|embed_vision|embed_audio)\..*'
  task_type: "CAUSAL_LM"

data:
  sft_chain_dir: "./data/sft_chains_scored.parquet"
  test_split: 0.05
  seed: 42
  min_chain_depth: 3
  min_total_score: 0.0
  weight_beta: 0 # do a simple sft first
  weight_mode: "gate_amplify"
  weight_floor: 0.1
  weight_max: 2.0

# Hardware profiles
profiles:
  local:
    # TITAN RTX 24GB -- too small for 27B, eval/prototyping only
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 1
    bf16: false
    fp16: true
    full_finetune: false
    attn_implementation: "eager"
    gradient_checkpointing: true
    max_length: 1024

  cloud:
    # QLoRA gemma-3-27b, RTX PRO 6000 WS 96GB
    # 27B in 4-bit ~ 14GB weights, ~80GB headroom for activations
    per_device_train_batch_size: 6
    gradient_accumulation_steps: 2
    bf16: true
    fp16: false
    full_finetune: false
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

  cloud_full:
    # Full FT 27B -- needs multi-GPU or very large VRAM
    # All 27B params + Adam states ~ 200GB+ in bf16
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    bf16: true
    fp16: false
    full_finetune: true
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

# DPO training
dpo:
  data_dir: "./data/dpo_pairs.parquet"
  beta: 0.1
  loss_type: ["sigmoid", "sft"]
  loss_weights: [1.0, 0.1]
  output_dir: "outputs/dpo"
  learning_rate: 5.0e-6
  num_train_epochs: 1
  max_prompt_length: 1024
  save_steps: 1000
  eval_steps: 1000
  min_score_delta: 0.0
  precompute_ref_log_probs: false
  chosen_weighting: false
  weight_beta: 0.3
  weight_mode: "gate_amplify"
  run_name: "gemma3-27b-dpo"

# Weighted SFT training
training:
  output_dir: "outputs/gemma3_sft_trial"
  num_train_epochs: 1
  learning_rate: 2.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 2000
  eval_steps: 2000
  eval_strategy: "steps"
  save_total_limit: 5
  report_to: "wandb"
  run_name: "gemma3-27b-sft-test-long-context"
  dataset_num_proc: 16
